name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout material theme
        uses: actions/checkout@v4
        with:
          repository: viosey/hexo-theme-material
          ref: 6fd8fe99d5ad69ac41b82e1bed947e2ddeca58c3
          path: themes/material

      - name: Setup material theme config
        run: cp themes/material/_config.template.yml themes/material/_config.yml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '12'

      - name: Install dependencies
        run: npm install

      - name: Install Hexo CLI
        run: npm install -g hexo-cli

      - name: Generate static files
        run: hexo generate

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: blog.taoai.site
