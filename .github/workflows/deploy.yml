name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout material theme
        uses: actions/checkout@v4
        with:
          repository: viosey/hexo-theme-material
          ref: 6fd8fe99d5ad69ac41b82e1bed947e2ddeca58c3
          path: themes/material

      - name: Restore theme config and custom assets
        run: |
          cp _theme_config.yml themes/material/_config.yml
          cp -r source/img/* themes/material/source/img/
          # Fix busuanzi span IDs for new CDN (3.x)
          sed -i 's/busuanzi_value_site_uv/busuanzi_site_uv/g' themes/material/layout/_partial/blog_info.ejs
          sed -i 's/busuanzi_value_page_pv/busuanzi_page_pv/g' themes/material/layout/_partial/post-info-share.ejs
          sed -i 's|busuanzi.ibruce.info|cdn.busuanzi.cc|g' themes/material/layout/_widget/dnsprefetch.ejs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '12'

      - name: Install dependencies
        run: npm install

      - name: Install Hexo CLI
        run: npm install -g hexo-cli

      - name: Generate static files
        run: hexo generate

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: blog.taoai.site
